# Lang-Ango Configuration
# Example configuration file

service:
  name: lang-ango
  version: "0.1.0"
  environment: development

discovery:
  # PID to instrument (0 = all)
  pid: 0
  # Specific ports to monitor (empty = all)
  ports: [80, 443, 8080, 3000, 50051]
  # Process names to discover
  names: []
  # Discovery interval
  interval: 10s

# OpenTelemetry configuration
otel:
  # OTLP endpoint
  endpoint: "localhost:4319"
  # Use insecure connection
  insecure: true
  # Protocol: grpc or http
  protocol: "grpc"

# Prometheus metrics
prometheus:
  enabled: true
  port: 9400

# Kubernetes enrichment
kubernetes:
  enabled: false
  resync_period: 30s

# eBPF configuration
ebpf:
  # eBPF objects directory
  bpf_dir: "./bpf/bin"
  # Ring buffer size
  buffer_size: 4096
  # Perf buffer size  
  perf_buffer_size: 8192
  # Maximum number of flows to track
  max_flows: 65536

# .NET Profiler Configuration
dotnet:
  enabled: true
  # Path to the profiler shared library
  profiler_path: "./dotnet"
  # Enable selective sampling (Dynatrace-level)
  selective_sampling:
    # Slow request threshold in ms (Dynatrace standard: 2000ms)
    slow_request_threshold_ms: 2000
    # Capture call stacks on exceptions
    capture_on_exception: true
    # Stack sampling interval in ms (100ms = 10 samples/sec)
    sampling_interval_ms: 100
    # Maximum stack depth to capture
    max_stack_depth: 64

# IPC Configuration (Unix Domain Socket)
ipc:
  # Socket path for communication with .NET profiler
  socket_path: "/tmp/langango.sock"
  # Buffer size in MB
  buffer_size_mb: 64
  # Enable debug logging
  debug: true

# Sampling configuration
sampling:
  traces:
    # Always sample first request
    initial: 1.0
    # Probabilistic sampling rate
    probability: 1.0
    # Rate limit per second
    rate_limit: 100
  profiles:
    # CPU profiling frequency (Hz)
    cpu_hz: 19

# Protocol filters
protocols:
  http: true
  grpc: true
  postgres: true
  mysql: true
  redis: true
  kafka: false
