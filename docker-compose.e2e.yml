version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoapi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./tests/e2e/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # gRPC
      - "4318:4318" # HTTP

  lang-ango-agent:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    privileged: true
    environment:
      LANG_ANGO_CONFIG: /etc/lang-ango/config.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - ./config.yaml:/etc/lang-ango/config.yaml:ro
    depends_on:
      - otel-collector

  autoapi:
    build:
      context: ./dotnet/AutoApi.E2ETestApp
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Username=postgres;Password=postgres;Database=autoapi
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  e2e-tests:
    image: golang:1.21
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      OTLP_ENDPOINT: http://otel-collector:4318
      APP_ENDPOINT: http://autoapi:8080
    depends_on:
      - autoapi
      - lang-ango-agent
      - otel-collector
    command: >
      sh -c "
        go test -v -tags=integration ./tests/e2e
      "

