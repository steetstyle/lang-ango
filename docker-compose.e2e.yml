services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoapi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.58
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # UI + query API
      - "4319:4317"   # OTLP gRPC (host-side, avoids collision with otel-collector)

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.108.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./tests/e2e/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # gRPC
      - "4318:4318" # HTTP
    depends_on:
      - jaeger

  # Agent runs with host network so eBPF can see traffic to host:8080 (autoapi).
  # OTLP is sent to host's 4317 (otel-collector). Linux only.
  lang-ango-agent:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    privileged: true
    network_mode: host
    environment:
      LANG_ANGO_CONFIG: /etc/lang-ango/config.yaml
      OTEL_EXPORTER_OTLP_ENDPOINT: http://127.0.0.1:4317
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/kernel/btf:/sys/kernel/btf:ro
      - ./config.yaml:/etc/lang-ango/config.yaml:ro
    depends_on:
      - otel-collector

  autoapi:
    build:
      context: ./tests/dotnet/AutoApi.E2ETestApp
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Username=postgres;Password=postgres;Database=autoapi
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # e2e-tests use host network so requests go to 127.0.0.1:8080 and the agent can see them.
  e2e-tests:
    image: golang:1.24
    network_mode: host
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      OTLP_ENDPOINT: http://127.0.0.1:4318
      APP_ENDPOINT: http://127.0.0.1:8080
      JAEGER_ENDPOINT: http://127.0.0.1:16686
    depends_on:
      - autoapi
      - lang-ango-agent
      - otel-collector
      - jaeger
    command: >
      sh -c "
        sleep 5 &&
        go test -v -tags=integration ./tests/e2e
      "

